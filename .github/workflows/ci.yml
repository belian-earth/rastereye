name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/extension.js || (echo "dist/extension.js not found" && exit 1)
          test -f dist/webview.js || (echo "dist/webview.js not found" && exit 1)
          test -f dist/viewer.html || (echo "dist/viewer.html not found" && exit 1)

      - name: Package extension
        run: npm run package

      - name: Verify package
        run: test -f rastereye-*.vsix || (echo "VSIX not found" && exit 1)
