<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RasterEye</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #74ac90;
      --panel-bg: rgba(20, 20, 20, 0.7);
      --panel-radius: 10px;
      --panel-shadow: 0 4px 20px rgba(0,0,0,0.4);
      --input-bg: rgba(255, 255, 255, 0.08);
      --input-border: rgba(255, 255, 255, 0.12);
      --input-hover: rgba(255, 255, 255, 0.14);
      --text: #ccc;
      --text-dim: #888;
      --text-bright: #eee;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 11px;
      color: var(--text);
      background: #1b1b1b;
      user-select: none;
    }

    #map { position: absolute; inset: 0; }

    #panel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 250px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: var(--panel-radius);
      box-shadow: var(--panel-shadow);
      padding: 14px;
      z-index: 100;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Scrollbar */
    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-bright);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      letter-spacing: 0.2px;
      cursor: pointer;
      user-select: none;
    }
    .panel-header span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .panel-header .chevron {
      flex-shrink: 0;
      opacity: 0.5;
      transition: transform 0.25s ease, opacity 0.2s;
    }
    .panel-header:hover .chevron { opacity: 0.9; }
    #panel.collapsed .panel-header {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    #panel.collapsed .chevron {
      transform: rotate(-90deg);
    }

    #panel-body {
      overflow: hidden;
      max-height: 800px;
      transition: max-height 0.3s ease, opacity 0.25s ease;
      opacity: 1;
    }
    #panel.collapsed #panel-body {
      max-height: 0;
      opacity: 0;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    select, input[type="number"] {
      width: 100%;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    select:hover, input[type="number"]:hover {
      background: var(--input-hover);
    }
    select:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }
    select option {
      background: #1a1a1a;
      color: var(--text);
    }

    /* Custom range slider (a5view style) */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      background: linear-gradient(to right, var(--accent) var(--pct, 100%), rgba(255,255,255,0.12) var(--pct, 100%));
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid rgba(20,20,20,0.8);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid rgba(20,20,20,0.8);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    input[type="range"]::-moz-range-track {
      height: 4px; border-radius: 2px; border: none;
      background: rgba(255,255,255,0.12);
    }
    input[type="range"]::-moz-range-progress {
      height: 4px; border-radius: 2px;
      background: var(--accent);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row input[type="range"] { flex: 1; }
    .slider-row span {
      font-size: 11px;
      min-width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-weight: 500;
    }

    .range-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .range-row input { flex: 1; }
    .range-row span {
      font-size: 10px;
      color: var(--text-dim);
    }

    #colormap-preview {
      width: 100%;
      height: 12px;
      border-radius: 4px;
      margin-top: 6px;
      border: 1px solid var(--input-border);
    }

    .hidden { display: none !important; }

    .fullscreen-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }

    .glass-box {
      background: var(--panel-bg);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: var(--panel-radius);
      box-shadow: var(--panel-shadow);
      font-size: 12px;
      letter-spacing: 0.2px;
    }

    #loading-box {
      padding: 16px 28px;
      color: var(--text-bright);
    }

    #error-box {
      background: rgba(90, 29, 29, 0.85);
      padding: 16px 24px;
      border: 1px solid rgba(190, 17, 0, 0.4);
      max-width: 400px;
      color: #f0a0a0;
    }

    .band-row {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
      align-items: center;
    }
    .band-row span {
      font-size: 11px;
      min-width: 16px;
      font-weight: 600;
    }
    .band-row select { flex: 1; }

    .info-text {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 0.2px;
    }

    /* Separator between control groups */
    .control-group + .control-group {
      padding-top: 2px;
    }

    /* Band color indicators */
    .band-r { color: #e06060; }
    .band-g { color: var(--accent); }
    .band-b { color: #6090d0; }

    /* MapLibre navigation controls — glass style */
    .maplibregl-ctrl-group {
      background: var(--panel-bg) !important;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 8px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3) !important;
      border: none !important;
      overflow: hidden;
    }
    .maplibregl-ctrl-group button {
      width: 32px !important;
      height: 32px !important;
      background: transparent !important;
      border: none !important;
      border-bottom: 1px solid rgba(255,255,255,0.06) !important;
      cursor: pointer;
      transition: background 0.15s;
    }
    .maplibregl-ctrl-group button:last-child {
      border-bottom: none !important;
    }
    .maplibregl-ctrl-group button:hover {
      background: rgba(255,255,255,0.08) !important;
    }
    /* Icon colors */
    .maplibregl-ctrl-group button .maplibregl-ctrl-icon {
      filter: invert(0.7);
    }
    .maplibregl-ctrl-group button:hover .maplibregl-ctrl-icon {
      filter: invert(0.55) sepia(1) saturate(2) hue-rotate(100deg) brightness(1.1);
    }
    /* Compass needle */
    .maplibregl-ctrl-group button .maplibregl-ctrl-compass .maplibregl-ctrl-icon {
      filter: invert(0.7);
    }

    /* Attribution — subtle */
    .maplibregl-ctrl-attrib {
      background: rgba(0,0,0,0.4) !important;
      backdrop-filter: blur(8px);
      border-radius: 4px;
      font-size: 9px !important;
      padding: 2px 6px !important;
    }
    .maplibregl-ctrl-attrib a {
      color: var(--text-dim) !important;
    }
    .maplibregl-ctrl-attrib-button {
      filter: invert(0.7);
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="panel">
    <div class="panel-header" id="panel-toggle">
      <span id="filename">Loading...</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div id="panel-body">
    <div class="control-group">
      <label>Base Layer</label>
      <select id="basemap-select">
        <option value="light" selected>Light</option>
        <option value="dark">Dark</option>
        <option value="osm">OpenStreetMap</option>
        <option value="satellite">Satellite</option>
      </select>
    </div>

    <div class="control-group">
      <label>Opacity</label>
      <div class="slider-row">
        <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="1" style="--pct:100%">
        <span id="opacity-value">100%</span>
      </div>
    </div>

    <div class="control-group">
      <label>Render Mode</label>
      <select id="mode-select">
        <option value="singleband" selected>Single Band</option>
        <option value="3band">3-Band Composite</option>
      </select>
    </div>

    <div class="control-group hidden" id="falsecolor-group">
      <label>RGB Bands</label>
      <div class="band-row">
        <span class="band-r">R</span>
        <select id="band-r"></select>
      </div>
      <div class="band-row">
        <span class="band-g">G</span>
        <select id="band-g"></select>
      </div>
      <div class="band-row">
        <span class="band-b">B</span>
        <select id="band-b"></select>
      </div>
    </div>

    <div class="control-group hidden" id="singleband-group">
      <label>Band</label>
      <select id="band-single"></select>
    </div>

    <div class="control-group hidden" id="colormap-group">
      <label>Colormap</label>
      <select id="colormap-select"></select>
      <canvas id="colormap-preview" width="222" height="12"></canvas>
    </div>

    <div class="control-group" id="range-group">
      <label>Value Range</label>
      <div class="range-row">
        <input type="number" id="min-value" step="any" value="0">
        <span>to</span>
        <input type="number" id="max-value" step="any" value="255">
      </div>
      <div class="info-text" id="data-range-info"></div>
    </div>
    </div><!-- /panel-body -->
  </div>

  <div id="loading-overlay" class="fullscreen-overlay">
    <div id="loading-box" class="glass-box">Loading GeoTIFF...</div>
  </div>

  <div id="error-overlay" class="fullscreen-overlay hidden">
    <div id="error-box" class="glass-box"></div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    document.getElementById("panel-toggle").addEventListener("click", function() {
      document.getElementById("panel").classList.toggle("collapsed");
    });
  </script>
  <script type="module" src="./webview.js"></script>
</body>
</html>
